<!DOCTYPE html> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="personal folders with notes WOW">
    <title> Diamond Folders </title>
    <link rel="stylesheet" href="CSS/styles.css">

    <script type="module">
            import "./js/stateManager.js";
            
            //import createItems from "./js/createItems.js";
            //createItems();
            import setupFolderToggles from "./js/toggleFolders.js";
            setupFolderToggles();

            import setupNotepad from "./js/note.js";
            setupNotepad();
        </script>
</head>


    <body>

        <<div id="tool-bar" style="position: relative;">
            <img src="trifolio-logo.svg" alt="Trifolio" style="height: 40px; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);">
            <div id="create" style="margin-left: 90px;">
                <button id="create-folder">New Folder</button>
                <button id="delete-folder">Delete Folder</button>
                <button id="create-file">New File</button>
                <button id="delete-file">Delete File</button>
            </div>
            <div id="note-buttons">
                <button id="edit-note-btn">Edit</button>
                <button id="save-note-btn">Save</button>
            </div>
        </div>
        <div id="app">
            


                <div id="root-folders">#root-folders
                    <button id="show-folders-btn">Show</button>
                </div>

                <div id="folders">#folders
                    <div id="folderB">
                        <button id="hide-folders-btn">Hide</button>
                        <button id="show-files-btn">Show</button>
                    </div>
                </div>
                
                <div id="files">#files
                    <button id="hide-files-btn">Hide</button>

                </div>


                    <div id="note-pad">

                        <div id="note-text">
                            <div>
                                <p>No File Selected </p>
                            </div>
                        </div>

                            <div id="note-editor" style="display: none;">
                                <textarea id="note-area" rows="33" cols="112"></textarea>
                                
                            </div>
                    
                    </div>

        </div>
        
    </body>

</html>
